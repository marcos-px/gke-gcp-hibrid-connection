- name: Rotate database password
  hosts: cloudsql
  gather_facts: false

  vars_prompt:
    - name: new_password
      prompt: "New database password"
      private: true
      confirm: true

  tasks:
    - name: Add new secret version
      shell: >
        echo -n "{{ new_password }}" |
        gcloud secrets versions add db-password
        --data-file=-
        --project="{{ gcp_service_project }}"
      delegate_to: localhost
      no_log: true

    - name: Verify active version
      command: >
        gcloud secrets versions list db-password
        --project="{{ gcp_service_project }}"
        --limit=1
        --format="value(name,state)"
      delegate_to: localhost
      register: version_info
      changed_when: false

    - name: Display active version
      debug:
        msg: "New secret version: {{ version_info.stdout }}"